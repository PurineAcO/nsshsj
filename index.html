<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静力学求解器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid">
        <!-- 左侧大菜单 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>静力学求解器</h2>
            </div>
            <ul class="main-menu nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#global">全局定义</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#force">外力</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#constraint">约束</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" onclick="solve()">求解</a>
                </li>
            </ul>
        </div>
        
        <!-- 中间和右侧内容区 -->
        <div class="content-wrapper">
            <!-- 中间输入区 -->
            <div class="input-area">
                <!-- 标签页内容 -->
                <div class="content-area">
                    <div class="tab-content">
                        <!-- 全局定义标签页 -->
                        <div class="tab-pane fade show active" id="global">
                            <h4>全局单位设置</h4>
                            <div class="mb-3">
                                <label for="forceUnit" class="form-label">力单位:</label>
                                <select id="forceUnit" class="form-select">
                                    <option value="N">N</option>
                                    <option value="kN">kN</option>
                                    <option value="MN">MN</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="momentUnit" class="form-label">力矩单位:</label>
                                <select id="momentUnit" class="form-select">
                                    <option value="N·m">N·m</option>
                                    <option value="kN·m">kN·m</option>
                                    <option value="MN·m">MN·m</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="lengthUnit" class="form-label">长度单位:</label>
                                <select id="lengthUnit" class="form-select">
                                    <option value="m">m</option>
                                    <option value="mm">mm</option>
                                </select>
                            </div>
                            <button id="applyUnits" class="btn btn-primary">应用全局单位</button>
                        </div>
                        
                        <!-- 外力标签页 -->
                        <div class="tab-pane fade" id="force">
                            <h4>外力</h4>
                            <ul class="nav nav-tabs" id="forceTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="force-tab" data-bs-toggle="tab" data-bs-target="#force-input" type="button" role="tab">集中力</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="moment-tab" data-bs-toggle="tab" data-bs-target="#moment-input" type="button" role="tab">集中力矩</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="distributed-force-tab" data-bs-toggle="tab" data-bs-target="#distributed-force-input" type="button" role="tab">分布力</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="distributed-moment-tab" data-bs-toggle="tab" data-bs-target="#distributed-moment-input" type="button" role="tab">分布力矩</button>
                                </li>
                            </ul>
                            <div class="tab-content" id="forceTabsContent">
                                <!-- 集中力输入 -->
                                <div class="tab-pane fade show active" id="force-input">
                                    <div class="mb-3">
                                        <label for="force-magnitude" class="form-label">大小:</label>
                                        <input type="text" id="force-magnitude" class="form-control" placeholder="例如: 100 或 2*50">
                                    </div>
                                    <div class="mb-3">
                                        <label for="force-position" class="form-label">作用点坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="force-position-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="force-position-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">方向:</label>
                                        <div class="row mb-2">
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDirection('+X')">+X</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDirection('-X')">-X</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDirection('+Y')">+Y</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDirection('-Y')">-Y</button>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="force-direction-x" class="form-control" placeholder="X方向分量" value="1">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="force-direction-y" class="form-control" placeholder="Y方向分量" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <button id="add-force" class="btn btn-primary">添加集中力</button>
                                </div>
                                
                                <!-- 集中力矩输入 -->
                                <div class="tab-pane fade" id="moment-input">
                                    <div class="mb-3">
                                        <label for="moment-magnitude" class="form-label">大小:</label>
                                        <input type="text" id="moment-magnitude" class="form-control" placeholder="例如: 100 或 2*50">
                                    </div>
                                    <div class="mb-3">
                                        <label for="moment-position" class="form-label">作用点坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="moment-position-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="moment-position-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="moment-direction" class="form-label">方向:</label>
                                        <select id="moment-direction" class="form-select">
                                            <option value="1">顺时针</option>
                                            <option value="-1">逆时针</option>
                                        </select>
                                    </div>
                                    <button id="add-moment" class="btn btn-primary">添加集中力矩</button>
                                </div>
                                
                                <!-- 分布力输入 -->
                                <div class="tab-pane fade" id="distributed-force-input">
                                    <div class="mb-3">
                                        <label for="distributed-force-magnitude" class="form-label">集度大小:</label>
                                        <input type="text" id="distributed-force-magnitude" class="form-control" placeholder="例如: 100 或 2*50">
                                    </div>
                                    <div class="mb-3">
                                        <label for="distributed-force-start" class="form-label">起点坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-force-start-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-force-start-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="distributed-force-end" class="form-label">终点坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-force-end-x" class="form-control" placeholder="X坐标" value="1">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-force-end-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">方向:</label>
                                        <div class="row mb-2">
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDistributedForceDirection('+X')">+X</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDistributedForceDirection('-X')">-X</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDistributedForceDirection('+Y')">+Y</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setDistributedForceDirection('-Y')">-Y</button>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-force-direction-x" class="form-control" placeholder="X方向分量" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-force-direction-y" class="form-control" placeholder="Y方向分量" value="1">
                                            </div>
                                        </div>
                                    </div>
                                    <button id="add-distributed-force" class="btn btn-primary">添加分布力</button>
                                </div>
                                
                                <!-- 分布力矩输入 -->
                                <div class="tab-pane fade" id="distributed-moment-input">
                                    <div class="mb-3">
                                        <label for="distributed-moment-magnitude" class="form-label">集度大小:</label>
                                        <input type="text" id="distributed-moment-magnitude" class="form-control" placeholder="例如: 100 或 2*50">
                                    </div>
                                    <div class="mb-3">
                                        <label for="distributed-moment-start" class="form-label">起点坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-moment-start-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-moment-start-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="distributed-moment-end" class="form-label">终点坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-moment-end-x" class="form-control" placeholder="X坐标" value="1">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="distributed-moment-end-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="distributed-moment-direction" class="form-label">方向:</label>
                                        <select id="distributed-moment-direction" class="form-select">
                                            <option value="1">顺时针</option>
                                            <option value="-1">逆时针</option>
                                        </select>
                                    </div>
                                    <button id="add-distributed-moment" class="btn btn-primary">添加分布力矩</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 约束标签页 -->
                        <div class="tab-pane fade" id="constraint">
                            <h4>约束</h4>
                            <ul class="nav nav-tabs" id="constraintTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="fixed-hinge-tab" data-bs-toggle="tab" data-bs-target="#fixed-hinge-input" type="button" role="tab">固定铰</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="sliding-hinge-tab" data-bs-toggle="tab" data-bs-target="#sliding-hinge-input" type="button" role="tab">滑动铰</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="fixed-tab" data-bs-toggle="tab" data-bs-target="#fixed-input" type="button" role="tab">固定支座</button>
                                </li>
                            </ul>
                            <div class="tab-content" id="constraintTabsContent">
                                <!-- 固定铰输入 -->
                                <div class="tab-pane fade show active" id="fixed-hinge-input">
                                    <div class="mb-3">
                                        <label for="fixed-hinge-position" class="form-label">位置坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="fixed-hinge-position-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="fixed-hinge-position-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <button id="add-fixed-hinge" class="btn btn-primary">添加固定铰</button>
                                </div>
                                
                                <!-- 滑动铰输入 -->
                                <div class="tab-pane fade" id="sliding-hinge-input">
                                    <div class="mb-3">
                                        <label for="sliding-hinge-position" class="form-label">位置坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="sliding-hinge-position-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="sliding-hinge-position-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">滑动方向:</label>
                                        <div class="row mb-2">
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setSlidingDirection('+X')">+X</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setSlidingDirection('-X')">-X</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setSlidingDirection('+Y')">+Y</button>
                                            </div>
                                            <div class="col-md-3">
                                                <button class="btn btn-secondary w-100" onclick="setSlidingDirection('-Y')">-Y</button>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="sliding-hinge-direction-x" class="form-control" placeholder="X方向分量" value="1">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="sliding-hinge-direction-y" class="form-control" placeholder="Y方向分量" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <button id="add-sliding-hinge" class="btn btn-primary">添加滑动铰</button>
                                </div>
                                
                                <!-- 固定支座输入 -->
                                <div class="tab-pane fade" id="fixed-input">
                                    <div class="mb-3">
                                        <label for="fixed-position" class="form-label">位置坐标:</label>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="text" id="fixed-position-x" class="form-control" placeholder="X坐标" value="0">
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" id="fixed-position-y" class="form-control" placeholder="Y坐标" value="0">
                                            </div>
                                        </div>
                                    </div>
                                    <button id="add-fixed" class="btn btn-primary">添加固定支座</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 工作树 -->
                <div class="content-area">
                    <h5>工作树</h5>
                    <div id="objects-list" class="mt-2">
                        <!-- 力学对象将在这里显示 -->
                    </div>
                </div>
            </div>
            
            <!-- 右侧可视化和求解信息区 -->
            <div class="visualization-result-area">
                <!-- 可视化区域 -->
                <div class="visualization-panel">
                    <h5>可视化</h5>
                    <div id="visualization" class="visualization-area">
                        <!-- 可视化内容将通过JavaScript添加 -->
                        <div class="visualization-placeholder">
                            <p>力学模型可视化区域</p>
                            <p class="text-muted">功能暂未启用</p>
                        </div>
                    </div>
                </div>
                
                <!-- 求解结果区域 -->
                <div class="result-panel">
                    <div class="result-header">
                        <h5>求解结果</h5>
                        <ul class="nav nav-tabs" id="resultTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="log-tab" data-bs-toggle="tab" data-bs-target="#result-log" type="button" role="tab">日志</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="constraint-tab" data-bs-toggle="tab" data-bs-target="#result-constraint" type="button" role="tab">约束力</button>
                            </li>
                        </ul>
                    </div>
                    <div class="tab-content" id="resultTabsContent">
                        <div class="tab-pane fade show active" id="result-log">
                            <div id="log" class="result-content"></div>
                        </div>
                        <div class="tab-pane fade" id="result-constraint">
                            <div id="result" class="result-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.2"></script>
    <script src="script.js"></script>
</body>
</html>
